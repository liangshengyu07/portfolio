<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio - LIANGSHENGYU</title>
  <link href="fonts/google-fonts.css" rel="stylesheet">
  <script src="lib/tailwind.js"></script>
  <script src="lib/react.js"></script>
  <script src="lib/react-dom.js"></script>
  <script src="lib/babel.js"></script>
  <script src="lib/framer-motion.js"></script>
  <script>window.Motion = window.FramerMotion;</script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #070b0a; color: #e8e8f0; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    img, video { max-width: 100%; display: block; }
    ::selection { background: rgba(94, 210, 156, 0.2); }

    /* Reveal */
    .reveal { opacity: 0; transform: translateY(50px); transition: opacity 0.9s cubic-bezier(0.22, 1, 0.36, 1), transform 0.9s cubic-bezier(0.22, 1, 0.36, 1); }
    .reveal-left { opacity: 0; transform: translateX(-60px); transition: opacity 0.9s cubic-bezier(0.22, 1, 0.36, 1), transform 0.9s cubic-bezier(0.22, 1, 0.36, 1); }
    .reveal-right { opacity: 0; transform: translateX(60px); transition: opacity 0.9s cubic-bezier(0.22, 1, 0.36, 1), transform 0.9s cubic-bezier(0.22, 1, 0.36, 1); }
    .reveal-scale { opacity: 0; transform: scale(0.92); transition: opacity 0.9s cubic-bezier(0.22, 1, 0.36, 1), transform 0.9s cubic-bezier(0.22, 1, 0.36, 1); }
    .active, .active .reveal, .active .reveal-left, .active .reveal-right, .active .reveal-scale { opacity: 1; transform: translate(0) scale(1); }
    .d1 { transition-delay: 0.08s; } .d2 { transition-delay: 0.16s; } .d3 { transition-delay: 0.24s; }

    /* Hero */
    .hero-text { font-size: clamp(48px, 10vw, 140px); font-weight: 800; letter-spacing: -0.04em; line-height: 0.85; }

    /* Part 1 Dark */
    .full-bleed { position: relative; width: 100vw; margin-left: calc(-50vw + 50%); overflow: hidden; }
    .full-bleed img, .full-bleed video { width: 100%; display: block; }
    .full-bleed-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 80px 6vw 40px; background: linear-gradient(to top, rgba(7, 11, 10, 0.95) 0%, rgba(7, 11, 10, 0) 100%); }
    .full-bleed-num { font-size: 11px; color: #5ed29c; letter-spacing: 2px; font-weight: 500; }
    .full-bleed-title { font-size: clamp(24px, 3vw, 36px); font-weight: 600; color: #fff; margin-top: 8px; letter-spacing: -0.02em; }
    .full-bleed-desc { font-size: 14px; color: rgba(255, 255, 255, 0.55); line-height: 1.7; margin-top: 12px; max-width: 480px; }

    .split { display: grid; grid-template-columns: 1.2fr 1fr; gap: 60px; align-items: center; max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .split-reverse { grid-template-columns: 1fr 1.2fr; }
    .split img { width: 130%; border-radius: 6px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); transition: transform 0.4s ease, box-shadow 0.4s ease; }
    .split img:hover { transform: scale(1.02); box-shadow: 0 30px 80px rgba(0,0,0,0.5); }
    .split-num { font-size: 11px; color: #5ed29c; letter-spacing: 2px; font-weight: 500; margin-bottom: 12px; }
    .split-title { font-size: clamp(22px, 2.5vw, 30px); font-weight: 600; color: #fff; letter-spacing: -0.02em; line-height: 1.2; }
    .split-desc { font-size: 14px; color: rgba(255, 255, 255, 0.55); line-height: 1.7; margin-top: 16px; }
    .split-meta { font-size: 12px; color: rgba(255, 255, 255, 0.3); margin-top: 20px; letter-spacing: 0.05em; }

    .offset-left { display: grid; grid-template-columns: 1fr 0.5fr; gap: 40px; max-width: 1200px; margin: 0 auto; padding: 0 24px; align-items: end; }
    .offset-left .img-wrap { margin-left: -10vw; }
    .offset-right { display: grid; grid-template-columns: 0.5fr 1fr; gap: 40px; max-width: 1200px; margin: 0 auto; padding: 0 24px; align-items: end; }
    .offset-right .img-wrap { margin-right: -10vw; }
    .offset-left img, .offset-right img { width: 100%; border-radius: 6px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); transition: transform 0.4s ease, box-shadow 0.4s ease; }
    .offset-left img:hover, .offset-right img:hover { transform: scale(1.02); box-shadow: 0 30px 80px rgba(0,0,0,0.5); }
    .offset-num { font-size: 11px; color: #5ed29c; letter-spacing: 2px; font-weight: 500; margin-bottom: 12px; }
    .offset-title { font-size: clamp(22px, 2.5vw, 30px); font-weight: 600; color: #fff; letter-spacing: -0.02em; }
    .offset-desc { font-size: 14px; color: rgba(255, 255, 255, 0.55); line-height: 1.7; margin-top: 16px; }

    .section-label { font-size: 11px; color: #5ed29c; letter-spacing: 3px; font-weight: 500; text-transform: uppercase; }
    .section-title { font-size: clamp(36px, 6vw, 72px); font-weight: 700; letter-spacing: -0.03em; line-height: 1; color: #fff; }
    .section-desc { font-size: 15px; color: rgba(255, 255, 255, 0.5); line-height: 1.7; max-width: 440px; }
    .tag { display: inline-block; font-size: 11px; color: #5ed29c; border: 1px solid rgba(94, 210, 156, 0.25); padding: 4px 12px; border-radius: 20px; margin-right: 6px; margin-bottom: 6px; }

    /* Part 1 Header title row */
    .p1-header-row { display: flex; flex-wrap: wrap; align-items: baseline; gap: 12px; }

    /* Part 2 — Sticky Scroll */
    .part2-light { background: #f9f9fa; color: #1a1a1a; }
    .p2-label { font-size: 11px; color: #999; letter-spacing: 4px; font-weight: 500; text-transform: uppercase; }
    .p2-title { font-size: clamp(48px, 8vw, 80px); font-weight: 800; letter-spacing: -0.04em; line-height: 0.95; color: #1a1a1a; }
    .p2-subtitle { font-size: 18px; color: #666; margin-top: 24px; line-height: 1.6; max-width: 600px; font-weight: 400; }

    .p2-divider { height: 1px; background: #e0e0e0; max-width: 1200px; margin: 0 auto; }

    .section-divider { height: 1px; background: rgba(255, 255, 255, 0.04); max-width: 1200px; margin: 0 auto; }
    .section-gap { height: 100px; }
    .item-gap { height: 120px; }
    .part-gap { height: 200px; }

    /* ─── Part 2 Stacking Cards (IDC) ─── */
    .stack-card { position: sticky; top: 0; height: 100vh; display: flex; align-items: center; justify-content: center; background: #f9f9fa; overflow: hidden; }
    .stack-card-inner { display: grid; grid-template-columns: 0.55fr 1.45fr; gap: 40px; width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 24px; align-items: center; }
    .stack-card-text { padding: 20px 0; }
    .stack-card-num { font-size: 11px; color: #3370ff; letter-spacing: 2px; font-weight: 600; margin-bottom: 16px; }
    .stack-card-title { font-size: clamp(22px, 2.5vw, 30px); font-weight: 700; color: #1a1a1a; letter-spacing: -0.02em; line-height: 1.2; }
    .stack-card-desc { font-size: 15px; color: #666; line-height: 1.8; margin-top: 16px; max-width: 400px; }
    .stack-card-img { height: 100vh; margin-right: -10vw; display: flex; gap: 16px; align-items: center; justify-content: flex-start; overflow: visible; }
    .stack-card-img img { height: auto; max-height: 100vh; width: auto; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.08); }
    .stack-card-tags { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
    .stack-card-tag { font-size: 11px; color: #3370ff; background: rgba(51, 112, 255, 0.06); border: 1px solid rgba(51, 112, 255, 0.2); padding: 4px 12px; border-radius: 4px; font-weight: 500; }
    .stack-card-enter { opacity: 0; transform: translateY(30px) scale(0.97); transition: all 0.7s cubic-bezier(0.22, 1, 0.36, 1); }
    .stack-card-enter.active { opacity: 1; transform: translateY(0) scale(1); }

    @media (max-width: 900px) {
      .stack-card-inner { grid-template-columns: 1fr; padding: 40px 24px; }
      .stack-card-img { height: auto; max-height: 55vh; margin-right: 0; }
      .stack-card { height: auto; padding: 40px 0; }
    }
    .p3-item { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .p3-item-reverse { grid-template-columns: 1fr 1fr; }
    .p3-item img { width: 100%; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.08); transition: transform 0.4s ease, box-shadow 0.4s ease; }
    .p3-item img:hover { transform: scale(1.02); box-shadow: 0 30px 80px rgba(0,0,0,0.12); }
    .p3-item-num { font-size: 11px; color: #3370ff; letter-spacing: 2px; font-weight: 600; margin-bottom: 12px; }
    .p3-item-title { font-size: clamp(22px, 2.5vw, 30px); font-weight: 700; color: #1a1a1a; letter-spacing: -0.02em; }
    .p3-item-desc { font-size: 15px; color: #666; line-height: 1.8; margin-top: 16px; }
    .p3-item-tags { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
    .p3-item-tag { font-size: 11px; color: #3370ff; background: rgba(51, 112, 255, 0.06); border: 1px solid rgba(51, 112, 255, 0.2); padding: 4px 12px; border-radius: 4px; font-weight: 500; }

    @media (max-width: 900px) {
      .p3-item, .p3-item-reverse { grid-template-columns: 1fr; gap: 24px; }
    }

    @media (max-width: 900px) {
      .split, .split-reverse { grid-template-columns: 1fr; gap: 24px; }
      .offset-left, .offset-right { grid-template-columns: 1fr; gap: 24px; }
      .offset-left .img-wrap, .offset-right .img-wrap { margin-left: 0; margin-right: 0; }
      .p2-sticky-container { grid-template-columns: 1fr; padding-top: 40px; }
      .p2-image-col { position: relative; top: 0; height: auto; margin-bottom: 40px; order: -1; }
      .p2-image-wrapper { height: 60vh; width: 100%; }
      .p2-text-item { min-height: auto; padding: 40px 0; }
      .full-bleed-overlay { padding: 40px 24px 24px; }
      .item-gap { height: 80px; }
      .section-gap { height: 60px; }
      .part-gap { height: 100px; }
      .p2-image-row { gap: 12px; }
      .p2-image-row img { height: 70%; }
    }

    /* ─── Liquid Glass ─── */
    .liquid-glass {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.45) 0%,
        rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.15) 80%,
        rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    .liquid-glass-strong {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      border: none;
      box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass-strong::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.5) 0%,
        rgba(255,255,255,0.2) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.2) 80%,
        rgba(255,255,255,0.5) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* ─── Part 3 — Melos Studio ─── */
    .p3-full-bleed { position: relative; width: 100vw; margin-left: calc(-50vw + 50%); overflow: hidden; max-height: 85vh; }
    .p3-full-bleed img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
    .p3-full-bleed-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 80px 6vw 40px; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 100%); }

    .p3-split-left { display: grid; grid-template-columns: 1.3fr 1fr; gap: 40px; align-items: center; max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .p3-split-left .img-wrap { margin-left: -10vw; overflow: hidden; max-height: 80vh; border-radius: 6px; }
    .p3-split-left img { width: 100%; height: 100%; object-fit: cover; object-position: top; border-radius: 6px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }

    .p3-split-right { display: grid; grid-template-columns: 1fr 1.3fr; gap: 40px; align-items: center; max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .p3-split-right .img-wrap { margin-right: -10vw; overflow: hidden; max-height: 80vh; border-radius: 6px; }
    .p3-split-right img { width: 100%; height: 100%; object-fit: cover; object-position: top; border-radius: 6px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }

    .p3-offset-left { display: grid; grid-template-columns: 1fr 0.5fr; gap: 40px; max-width: 1200px; margin: 0 auto; padding: 0 24px; align-items: end; }
    .p3-offset-left .img-wrap { margin-left: -10vw; overflow: hidden; max-height: 80vh; border-radius: 6px; }
    .p3-offset-right { display: grid; grid-template-columns: 0.5fr 1fr; gap: 40px; max-width: 1200px; margin: 0 auto; padding: 0 24px; align-items: end; }
    .p3-offset-right .img-wrap { margin-right: -10vw; overflow: hidden; max-height: 80vh; border-radius: 6px; }
    .p3-offset-left img, .p3-offset-right img { width: 100%; height: 100%; object-fit: cover; object-position: top; border-radius: 6px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }

    .p3-num { font-size: 11px; color: #f97316; letter-spacing: 2px; font-weight: 500; margin-bottom: 12px; }
    .p3-title { font-size: clamp(22px, 2.5vw, 30px); font-weight: 600; color: #fff; letter-spacing: -0.02em; line-height: 1.2; }
    .p3-subtitle { font-size: 12px; color: rgba(255,255,255,0.35); letter-spacing: 1px; font-weight: 500; text-transform: uppercase; margin-top: 6px; }
    .p3-desc { font-size: 14px; color: rgba(255,255,255,0.55); line-height: 1.7; margin-top: 16px; }

    @media (max-width: 900px) {
      .p3-split-left, .p3-split-right { grid-template-columns: 1fr; gap: 24px; }
      .p3-split-left .img-wrap, .p3-split-right .img-wrap { margin-left: 0; margin-right: 0; }
      .p3-offset-left, .p3-offset-right { grid-template-columns: 1fr; gap: 24px; }
      .p3-offset-left .img-wrap, .p3-offset-right .img-wrap { margin-left: 0; margin-right: 0; }
      .p3-full-bleed { max-height: 60vh; }
    }

    /* ─── Space Travel Part 3 ─── */
    .font-heading { font-family: 'Instrument Serif', serif; font-style: italic; }
    .font-body { font-family: 'Barlow', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Menu = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <line x1="4" x2="20" y1="12" y2="12" /><line x1="4" x2="20" y1="6" y2="6" /><line x1="4" x2="20" y1="18" y2="18" />
      </svg>
    );
    const X = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M18 6 6 18" /><path d="m6 6 12 12" />
      </svg>
    );
    const ArrowDown = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M12 5v14" /><path d="m19 12-7 7-7-7" />
      </svg>
    );

    function Header() {
      const [open, setOpen] = useState(false);
      const links = [{ label: '即幕云AI', href: '#p1' }, { label: '担当办公', href: '#p2' }, { label: 'Melos Studio', href: '#p3' }];
      return (
        <>
          <header className="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-6 md:px-12 lg:px-20 py-6 backdrop-blur-md bg-[#070b0a]/30">
            <div className="text-white text-[13px] font-medium tracking-[0.2em] uppercase select-none">Portfolio</div>
            <nav className="hidden md:flex items-center gap-8">
              {links.map(l => <a key={l.label} href={l.href} className="text-white/30 text-[14px] font-medium hover:text-white transition-colors duration-300">{l.label}</a>)}
            </nav>
            <button className="md:hidden text-white" onClick={() => setOpen(true)} aria-label="Open menu"><Menu className="w-6 h-6" /></button>
          </header>
          {open && (
            <div className="fixed inset-0 z-[100] bg-[#070b0a] flex flex-col items-center justify-center gap-8">
              <button className="absolute top-6 right-6 text-white" onClick={() => setOpen(false)} aria-label="Close menu"><X className="w-6 h-6" /></button>
              {links.map(l => <a key={l.label} href={l.href} className="text-white text-[32px] font-light tracking-wide" onClick={() => setOpen(false)}>{l.label}</a>)}
            </div>
          )}
        </>
      );
    }

    function HeroSection() {
      return (
        <section className="relative h-screen w-full overflow-hidden bg-[#070b0a] flex items-end">
          <div className="absolute inset-0 z-0">
            <video autoPlay muted loop playsInline className="w-full h-full object-cover opacity-80" src="videos/hero.mp4" />
          </div>
          <div className="absolute inset-0 z-[1] bg-gradient-to-r from-[#070b0a]/80 via-[#070b0a]/20 to-transparent pointer-events-none" />
          <div className="absolute inset-0 z-[1] bg-gradient-to-t from-[#070b0a] via-transparent to-[#070b0a]/10 pointer-events-none" />
          <div className="absolute inset-0 z-[1] hidden md:block pointer-events-none">
            <div className="absolute top-0 left-1/4 w-px h-full bg-white/10" />
            <div className="absolute top-0 left-1/2 w-px h-full bg-white/10" />
            <div className="absolute top-0 left-3/4 w-px h-full bg-white/10" />
          </div>
          <div className="relative z-10 px-6 md:px-12 lg:px-20 pb-16 md:pb-24 w-full">
            <span className="text-[11px] text-[#5ed29c] tracking-[0.4em] uppercase font-medium block mb-6">LIANGSHENGYU</span>
            <h1 className="hero-text text-white">PORTFOLIO</h1>
            <div className="mt-8 md:mt-12 flex flex-col md:flex-row md:items-end gap-6 md:gap-20">
              <p className="text-[13px] text-white/50 font-light tracking-[0.15em] uppercase leading-relaxed max-w-[280px]">
                UI/UX Designer<br />Product experience & visual storytelling
              </p>
              <div className="hidden md:flex items-center gap-2 text-white/30 text-[11px] tracking-widest uppercase animate-pulse">
                <ArrowDown className="w-3 h-3" /> Scroll
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ─── Part 1 Header ─── */
    function Part1Header() {
      return (
        <div className="max-w-[1200px] mx-auto px-6 md:px-12 lg:px-20 pt-[140px] pb-20" id="p1">
          <div className="flex flex-col md:flex-row md:justify-between md:items-start gap-8 reveal">
            <span className="section-label mt-3">Part 01</span>
            <div className="md:max-w-[560px]">
              <h2 className="section-title">即幕云AI视频平台</h2>
              <p className="section-desc mb-5 mt-4">AI-driven film & video creation platform. From script to storyboard, shot generation to final cut.</p>
              <div className="flex flex-wrap"><span className="tag">AI</span><span className="tag">Film</span><span className="tag">Creation</span><span className="tag">SaaS</span></div>
            </div>
          </div>
        </div>
      );
    }

    /* ─── Part 1 Layouts ─── */
    function FullBleed({ num, title, desc, img, cls }) {
      const isVideo = img.endsWith('.mov') || img.endsWith('.mp4');
      return (
        <div className={`full-bleed ${cls || ''}`}>
          {isVideo ? (
            <video src={img} autoPlay muted loop playsInline />
          ) : (
            <img src={img} alt={title} loading="lazy" />
          )}
          <div className="full-bleed-overlay">
            <span className="full-bleed-num">{num}</span>
            <div className="full-bleed-title">{title}</div>
            <p className="full-bleed-desc">{desc}</p>
          </div>
        </div>
      );
    }
    function SplitLeft({ num, title, desc, meta, img, cls }) {
      return (
        <div className={`split ${cls || ''}`}>
          <div className="reveal-left"><img src={img} alt={title} loading="lazy" /></div>
          <div className="reveal-right d2">
            <div className="split-num">{num}</div>
            <h3 className="split-title">{title}</h3>
            <p className="split-desc">{desc}</p>
            {meta && <p className="split-meta">{meta}</p>}
          </div>
        </div>
      );
    }
    function SplitRight({ num, title, desc, meta, img, cls }) {
      return (
        <div className={`split split-reverse ${cls || ''}`}>
          <div className="reveal-left d2">
            <div className="split-num">{num}</div>

    /* ─── Space Travel Part 3 ─── */
    const FADE_MS = 500;
    const FADE_OUT_LEAD = 0.55;

    function FadingVideo({ src, className, style }) {
      const videoRef = useRef(null);
      const rafRef = useRef(null);
      const fadingOutRef = useRef(false);

      const fadeTo = (target, duration) => {
        const video = videoRef.current;
        if (!video) return;
        if (rafRef.current) cancelAnimationFrame(rafRef.current);
        const startOpacity = parseFloat(video.style.opacity || '0');
        const startTime = performance.now();
        const animate = (now) => {
          const elapsed = now - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const current = startOpacity + (target - startOpacity) * progress;
          video.style.opacity = current.toString();
          if (progress < 1) {
            rafRef.current = requestAnimationFrame(animate);
          }
        };
        rafRef.current = requestAnimationFrame(animate);
      };

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        const onLoadedData = () => {
          video.style.opacity = '0';
          video.play().catch(() => {});
          fadeTo(1, FADE_MS);
        };

        const onTimeUpdate = () => {
          if (!fadingOutRef.current && video.duration && video.duration - video.currentTime <= FADE_OUT_LEAD && video.duration - video.currentTime > 0) {
            fadingOutRef.current = true;
            fadeTo(0, FADE_MS);
          }
        };

        const onEnded = () => {
          video.style.opacity = '0';
          setTimeout(() => {
            video.currentTime = 0;
            video.play().catch(() => {});
            fadingOutRef.current = false;
            fadeTo(1, FADE_MS);
          }, 100);
        };

        video.addEventListener('loadeddata', onLoadedData);
        video.addEventListener('timeupdate', onTimeUpdate);
        video.addEventListener('ended', onEnded);

        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          video.removeEventListener('loadeddata', onLoadedData);
          video.removeEventListener('timeupdate', onTimeUpdate);
          video.removeEventListener('ended', onEnded);
        };
      }, [src]);

      return (
        <video
          ref={videoRef}
          src={src}
          autoPlay
          muted
          playsInline
          preload="auto"
          className={className}
          style={style}
        />
      );
    }

            desc="限量数字藏品的惊喜开箱体验，限时抢购与独家发售，为收藏家提供独特的获取途径。"
            img="melos/Frame 77725644@2x.png"
          />
          <div className="item-gap" />
          <P3OffsetLeft
            num="06"
            title="音乐创作库"
            subtitle="Music Loop Library"
            desc="多轨道音频管理与创作资源库，支持波形预览与标签分类，为创作者提供高效的资产管理工具。"
            img="melos/首页@2x.png"
          />
          <div className="item-gap" />
          <P3SplitRight
            num="07"
            title="音轨编辑器"
            subtitle="Track Editor"
            desc="直观的音轨管理与颜色标记系统，支持重命名、复制与删除，让复杂的编曲工作变得井井有条。"
            img="melos/4.1track@2x.png"
          />
          <div className="item-gap" />
          <P3FullBleed
            num="08"
            title="团队协作"
            subtitle="Collaborative Workspace"
            desc="实时评论与@提及的协作创作环境，多人同步编辑与反馈，打破地理限制，让创意协作无缝衔接。"
            img="melos/5.2@2x.png"
          />
        </div>
      );
    }

    function SpaceTravelHero() {
      return (
        <section className="relative min-h-screen bg-black overflow-hidden flex flex-col items-center justify-center">
          <FadingVideo
            src="videos/part3.mp4"
            className="absolute left-1/2 top-0 -translate-x-1/2 object-cover object-top z-0"
            style={{ width: '120%', height: '120%' }}
          />

          <div className="relative z-10 text-center px-4 flex flex-col items-center">
            <h1 className="font-heading italic text-white text-7xl md:text-8xl lg:text-[9rem] leading-[0.8] tracking-[-6px]">
              Melos Studio
            </h1>
            <p className="mt-6 text-base md:text-lg text-white/80 font-body font-light tracking-wide">
              数字音乐交易平台
            </p>
            <div className="mt-10 liquid-glass-strong rounded-2xl px-8 py-6 md:px-10 md:py-8 max-w-[520px] text-center">
              <p className="text-sm md:text-[15px] text-white/70 leading-relaxed font-light">
                数字音乐交易平台，从 NFT 交易市场到 DAW 创作工具，从发现探索到协作共创。
              </p>
              <div className="mt-5 flex flex-wrap justify-center gap-2">
                {['NFT', 'Music', 'Trading', 'DAW'].map(tag => (
                  <span key={tag} className="text-xs text-white/50 border border-white/15 px-3 py-1 rounded-full">{tag}</span>
                ))}
              </div>
            </div>
          </div>
        </section>
      );
    }

    function Part3() {
      return (
        <div className="bg-black" id="p3">
          <SpaceTravelHero />
          <P3Content />
        </div>
      );
    }

    function App() {
      useEffect(() => {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.06, rootMargin: '0px 0px -50px 0px' });
        document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale').forEach(el => observer.observe(el));
        return () => observer.disconnect();
      }, []);

      return (
        <div>
          <Header />
          <HeroSection />

          <div className="section-gap" />
          <div className="section-divider" />
          <div className="section-gap" />

          <Part1Header />
          <Part1Content />

          <div className="part-gap" />
          <div className="section-divider" />
          <div className="part-gap" />

          <Part2 />
          <Part3 />

          <Footer />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
